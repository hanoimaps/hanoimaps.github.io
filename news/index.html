<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hanoi Maps | Publications</title>
    <link rel="preconnect" href="https://baochi-tvqg.vercel.app" />
    <link rel="stylesheet" href="/info/info.css" />
    <style>
      .container {
        max-width: 1080px;
      }

      a {
        padding-top: 0 !important;
        padding-bottom: 0 !important;
      }

      h1 {
        margin-bottom: 12px;
      }

      #search-form {
        margin-bottom: 24px;
      }

      #query {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 14px;
        border: 1px solid rgba(255, 255, 255, 0.88);
        border-radius: 999px;
        background: transparent;
        color: inherit;
        font: inherit;
        font-size: 16px;
        outline: none;
      }

      #query::placeholder {
        color: rgba(255, 255, 255, 0.68);
      }

      #status {
        min-height: 20px;
        margin: 0 0 16px;
      }

      #results {
        column-width: 240px;
        column-gap: 12px;
      }
      @media (max-width: 768px) {
        body {
          padding: 8px;
        }

        .container {
          max-width: none;
        }

        #results {
          column-width: auto;
          column-count: 2;
          column-gap: 4px;
        }

        .card {
          margin: 0 0 3px !important;
          padding: 4px !important;
        }
      }

      .card {
        break-inside: avoid;
        margin: 0 0 12px;
        padding: 8px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.06);
      }

      .thumb {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.04);
      }

      .meta {
        font-size: 16px;
        padding: 2px;
      }

      .title {
        font-size: 13px !important;
        line-height: 1.45;
        opacity: 0.75;
        padding: 2px;
      }

      #load-more {
        display: none;
        margin: 20px auto 0;
        padding: 10px 14px;
        border: 1px solid rgba(255, 255, 255, 0.88);
        border-radius: 999px;
        background: transparent;
        color: inherit;
        font: inherit;
        font-size: 16px;
        cursor: pointer;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a href="/">
        <svg
          width="20"
          height="20"
          viewBox="0 0 16 16"
          fill="none"
          style="margin-right: 2px; margin-bottom: 0.5px"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M10 12L6 8L10 4"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        Home
      </a>
      <h1>Publications</h1>
      <form id="search-form">
        <input
          id="query"
          type="text"
          placeholder="Search anything..."
          autocomplete="off"
        />
      </form>
      <p id="status"></p>
      <div id="results"></div>
      <button id="load-more" type="button">Load more</button>
    </div>
    <script>
      const API_URL = "https://baochi-tvqg.vercel.app/api/search";
      const PAGE_SIZE = 24;
      const form = document.getElementById("search-form");
      const queryInput = document.getElementById("query");
      const statusEl = document.getElementById("status");
      const resultsEl = document.getElementById("results");
      const loadMoreButton = document.getElementById("load-more");
      const seenArticles = new Set();
      let currentQuery = "";
      let currentOffset = 0;
      let loading = false;

      function formatDate(value) {
        if (!value) return "";
        if (value.length === 8) {
          return `${value.slice(6, 8)}/${value.slice(4, 6)}/${value.slice(
            0,
            4
          )}`;
        }
        if (value.length >= 4) {
          return value.slice(0, 4);
        }
        return value;
      }

      function clearResults() {
        resultsEl.innerHTML = "";
        seenArticles.clear();
        currentOffset = 0;
      }

      function updateLoadMore(visible) {
        loadMoreButton.style.display = visible ? "block" : "none";
        if (visible) {
          loadMoreButton.disabled = false;
          loadMoreButton.textContent = "Load more";
        }
      }

      function renderResults(items) {
        if (!items.length && currentOffset === 0) {
          statusEl.textContent = "No results.";
          updateLoadMore(false);
          return;
        }
        const freshItems = items.filter((item) => {
          if (seenArticles.has(item.article_id)) {
            return false;
          }
          seenArticles.add(item.article_id);
          return true;
        });
        if (!freshItems.length && currentOffset === 0) {
          statusEl.textContent = "No results.";
          updateLoadMore(false);
          return;
        }
        if (!freshItems.length) {
          updateLoadMore(false);
          return;
        }

        statusEl.textContent = `${seenArticles.size} result${
          seenArticles.size > 1 ? "s" : ""
        }`;
        const fragment = document.createDocumentFragment();
        freshItems.forEach((item, index) => {
          const card = document.createElement("article");
          card.className = "card";

          const imageLink = document.createElement("a");
          imageLink.href = item.image_full_url || item.article_url;
          imageLink.target = "_blank";
          imageLink.rel = "noopener";

          const image = document.createElement("img");
          image.className = "thumb";
          image.alt = item.title || "News image";
          image.decoding = "async";
          image.loading = index < 8 && currentOffset === 0 ? "eager" : "lazy";
          image.fetchPriority = index < 8 && currentOffset === 0 ? "high" : "low";
          image.sizes = item.image_sizes || "(max-width: 768px) 50vw, 240px";
          if (item.image_srcset) {
            image.srcset = item.image_srcset;
          }
          image.src = item.image_url;
          imageLink.appendChild(image);

          const meta = document.createElement("div");
          meta.className = "meta";
          const metaLink = document.createElement("a");
          metaLink.href = item.article_url;
          metaLink.target = "_blank";
          metaLink.rel = "noopener";
          metaLink.textContent = [
            item.publication_name,
            formatDate(item.date_id),
          ]
            .filter(Boolean)
            .join(" · ");
          meta.appendChild(metaLink);

          const title = document.createElement("div");
          title.className = "title";
          title.textContent = item.title || item.article_url;

          card.appendChild(imageLink);
          card.appendChild(meta);
          card.appendChild(title);
          fragment.appendChild(card);
        });
        resultsEl.appendChild(fragment);
        currentOffset += items.length;
        updateLoadMore(items.length === PAGE_SIZE);
      }

      async function fetchResults(append) {
        if (loading) return;
        const query = currentQuery.trim();
        if (!query) {
          statusEl.textContent = "";
          updateLoadMore(false);
          return;
        }
        loading = true;
        if (append) {
          loadMoreButton.disabled = true;
          loadMoreButton.textContent = "Loading...";
        } else {
          updateLoadMore(false);
        }
        statusEl.textContent = append ? "Loading..." : "Searching...";
        try {
          const response = await fetch(
            `${API_URL}?q=${encodeURIComponent(
              query
            )}&limit=${PAGE_SIZE}&offset=${currentOffset}`
          );
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const payload = await response.json();
          renderResults(payload.results || []);
        } catch (error) {
          statusEl.textContent = append ? "Load failed" : "Search failed";
          updateLoadMore(false);
        } finally {
          loadMoreButton.disabled = false;
          loadMoreButton.textContent = "Load more";
          loading = false;
        }
      }

      function runSearch() {
        currentQuery = queryInput.value.trim();
        clearResults();
        if (!currentQuery) {
          statusEl.textContent = "";
          updateLoadMore(false);
          return;
        }
        fetchResults(false);
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        runSearch();
      });

      loadMoreButton.addEventListener("click", () => {
        fetchResults(true);
      });
    </script>
  </body>
</html>
